<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nearby Search</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7fb; color: #222; }
    .card { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    input, select, button { width: 100%; padding: 10px; margin: 6px 0; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    a { display: inline-block; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nearby Search</h1>
    <form method="post">
      <label for="place_id">Select a place:</label>
      <select id="place_id" name="place_id" required>
        <option value="">Select a place</option>
        {% for place in place_options %}
          <option value="{{ place.place_id }}" {% if selected_place_id == place.place_id %}selected{% endif %}>{{ place.place_name }}</option>
        {% endfor %}
      </select>
      <label for="distance">Distance:</label>
      <input id="distance" name="distance" type="number" value="{{ distance }}" min="1" required>
      <button type="submit">Search Nearby</button>
    </form>

    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Category</th><th>City</th><th>State</th><th>Distance (m)</th></tr>
      </thead>
      <tbody>
        {% for row in results %}
          <tr>
            <td>{{ row.place_id }}</td>
            <td>{{ row.place_name }}</td>
            <td>{{ row.category }}</td>
            <td>{{ row.city }}</td>
            <td>{{ row.state }}</td>
            <td>{{ row.distance_meters }}</td>
          </tr>
        {% else %}
          <tr><td colspan="6">No results yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="/">Back to home</a>
  </div>
</body>
</html>
