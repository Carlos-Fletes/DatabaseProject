<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        form {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        input, select, button {
            margin: 5px;
            padding: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #bbb;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Nearby Place Search</h1>

    <p><a href="{{ url_for('index') }}">Back to Home</a></p>

    <form method="POST" action="{{ url_for('nearby') }}">
        <label for="place_id">Select place:</label>
        <select id="place_id" name="place_id" required>
            <option value="">Select place</option>
            {% for place in place_options %}
                <option value="{{ place[0] }}" {% if selected_place_id == place[0]|string %}selected{% endif %}>
                    {{ place[1] }}
                </option>
            {% endfor %}
        </select>

        <input type="number" name="distance" placeholder="Distance in meters" value="{{ selected_distance or '' }}" required>
        <button type="submit">Search</button>
    </form>

    <h2>Results</h2>
    <table>
        <thead>
            <tr>
                <th>Place ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>City</th>
                <th>State</th>
                <th>Distance (meters)</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
